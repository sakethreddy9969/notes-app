<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Industrial Notes App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">
  
  <div class="auth-container">
    <div class="glass-panel auth-card">
      <h3>📒 Notes App</h3>
      <h5 class="text-center mb-4" style="color: var(--text-secondary);">Welcome Back</h5>
      
      <form id="loginForm">
        <div class="mb-3">
          <label for="loginEmail" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="loginEmail" placeholder="name@example.com" required>
        </div>
        <div class="mb-4">
          <label for="loginPassword" class="form-label">Password</label>
          <input type="password" class="form-control" id="loginPassword" placeholder="••••••••" required>
        </div>
        <button type="submit" id="loginSubmitBtn" class="btn-premium w-100">
          <span>Login</span>
        </button>
      </form>
      
      <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 14px;">
        Don't have an account? <a href="register.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 500;">Register</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
