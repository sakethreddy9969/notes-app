<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register | Industrial Notes App</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="style.css">
</head>
<body class="d-flex justify-content-center align-items-center min-vh-100">
  
  <div class="auth-container">
    <div class="glass-panel auth-card">
      <h3>📒 Notes App</h3>
      <h5 class="text-center mb-4" style="color: var(--text-secondary);">Create Account</h5>
      
      <form id="registerForm">
        <div class="mb-3">
          <label for="regName" class="form-label">Full Name</label>
          <input type="text" class="form-control" id="regName" placeholder="John Doe" required>
        </div>
        <div class="mb-3">
          <label for="regEmail" class="form-label">Email Address</label>
          <input type="email" class="form-control" id="regEmail" placeholder="john@example.com" required>
        </div>
        <div class="mb-3">
          <label for="regPassword" class="form-label">Password (Min 8 chars)</label>
          <input type="password" class="form-control" id="regPassword" placeholder="••••••••" required>
        </div>
        <div class="mb-4">
          <label for="regPasswordConfirm" class="form-label">Confirm Password</label>
          <input type="password" class="form-control" id="regPasswordConfirm" placeholder="••••••••" required>
        </div>
        <button type="submit" id="registerSubmitBtn" class="btn-premium w-100">
          <span>Register</span>
        </button>
      </form>
      
      <p class="text-center mt-4 mb-0" style="color: var(--text-secondary); font-size: 14px;">
        Already have an account? <a href="login.html" style="color: var(--accent-cyan); text-decoration: none; font-weight: 500;">Login</a>
      </p>
    </div>
  </div>

  <div class="toast-container" id="toastContainer"></div>

  <script src="script.js"></script>
</body>
</html>
